services:
  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  scraper:
    build: .
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DATABASE=forexfactory
      - PROXY_LIST_PATH=/proxies/proxies.txt
    volumes:
      - ${HOME}/proxies.txt:/proxies/proxies.txt:ro

volumes:
  mongo_data:
